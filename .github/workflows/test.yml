# Run the unit, integration, and documentation tests for a commit or pull request.
#
# The jobs are defined in reusable workflows so that this file remains a readable index of what runs, while still producing a
# single run in the Actions UI. Only this file has a trigger -- the called workflows are all on: workflow_call. Permissions are
# granted here because a called workflow can only maintain or reduce the permissions of the token it is given, never elevate them.
name: test

on:
  push:
    branches:
      - integration
      - '**-ci'
      - '**-cig'
  pull_request:
    branches:
      - integration
      - '**-ci'
      - '**-cig'

# Limit permissions on the repository
permissions:
  contents: read

jobs:
  doc:
    uses: ./.github/workflows/test-doc.yml

    # Allow pushing base images to the GHCR container cache
    permissions:
      contents: read
      packages: write

  linux:
    uses: ./.github/workflows/test-linux.yml

    # Allow pushing base images to the GHCR container cache
    permissions:
      contents: read
      packages: write

  arch:
    uses: ./.github/workflows/test-arch.yml

    # Allow pushing base images to the GHCR container cache
    permissions:
      contents: read
      packages: write

  bsd:
    uses: ./.github/workflows/test-bsd.yml

  dist:
    uses: ./.github/workflows/test-dist.yml

  misc:
    uses: ./.github/workflows/test-misc.yml
