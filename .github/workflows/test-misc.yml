# Checks that do not fit into any of the per-platform workflows, i.e. the unity build and code formatting. These all run on a stock
# x86_64 Linux runner.
name: misc

on: workflow_call

# Limit permissions on the repository
permissions:
  contents: read

jobs:
  # Run meson unity build to check for errors, unused functions, and externed functions
  unity:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          path: pgbackrest

      - name: Install
        run: |
          sudo apt-get update
          DEBCONF_NONINTERACTIVE_SEEN=true DEBIAN_FRONTEND=noninteractive sudo apt-get install -y zlib1g-dev libssl-dev libxml2-dev libpq-dev libyaml-dev pkg-config meson liblz4-dev libzstd-dev libbz2-dev

      - name: Build
        run: |
          meson setup --unity=on -Dwerror=true build ${GITHUB_WORKSPACE?}/pgbackrest
          ninja -vC build

      - name: Check
        run: |
          diff ${GITHUB_WORKSPACE?}/pgbackrest/.github/workflows/data/symbol.out <(nm -gj --defined-only build/src/pgbackrest)

  # Check that code is correctly formatted
  code-format:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          path: pgbackrest

      # Check that the smoke test, the only Python file, is formatted. On failure the exact command to fix it is printed so it can
      # be copied and run locally. This runs before the C format check because that check runs ci.pl, which removes passwordless
      # sudo, and installing black needs it.
      - name: Check Python Format
        run: |
          sudo apt-get update
          DEBCONF_NONINTERACTIVE_SEEN=true DEBIAN_FRONTEND=noninteractive sudo apt-get install -y black

          cd ${GITHUB_WORKSPACE?}/pgbackrest

          if ! black --check --diff --line-length=132 test/smoke.py; then
              echo
              echo "ERROR: test/smoke.py is not formatted correctly. Run this from the pgbackrest path to fix it:"
              echo
              echo "    black --line-length=132 test/smoke.py"
              echo
              exit 1
          fi

      - name: Check C Format
        run: |
          cd ${HOME?} && ${GITHUB_WORKSPACE?}/pgbackrest/test/ci.pl test --param=code-format-check
